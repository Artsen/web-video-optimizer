name: Feature request
description: Suggest a focused workflow improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: workflow
    attributes:
      label: Workflow
      description: What are you trying to accomplish?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Current limitation
      description: What is awkward, missing, or too manual today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: What would make the workflow better?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workaround or simpler version that might be enough?
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This can work in a local-first app without hosted accounts or cloud media processing.
        - label: I understand the API is intended for trusted local or LAN use.
