name: Bug report
description: Report a reproducible problem with the local app
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please redact private paths, URLs, filenames, transcripts, and media details where needed.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest workflow that reproduces the issue.
      placeholder: |
        1. Start the app with ...
        2. Upload ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11, macOS, Ubuntu, etc.
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: v20.x
  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Local Node
        - Docker Compose
        - Other
  - type: textarea
    id: tools
    attributes:
      label: Media tools
      description: Include FFmpeg/FFprobe versions and whether yt-dlp or whisper.cpp are configured.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant browser console or API terminal output with private details redacted.
