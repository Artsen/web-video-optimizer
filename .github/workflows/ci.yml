name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high

  media-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install dependencies
        run: npm ci

      - name: Real media integration tests
        run: npm run test:integration:media

      - name: Upload integration diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: media-integration-diagnostics
          path: apps/api/integration-artifacts
          if-no-files-found: ignore
          retention-days: 7

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          ffmpeg -version
          ffprobe -version

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Browser E2E
        run: npm run test:e2e

      - name: Upload browser diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-e2e-diagnostics
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 7

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Print Docker versions
        run: |
          docker --version
          docker compose version

      - name: Build Docker stack
        run: docker compose build --no-cache

      - name: Start Docker stack
        run: docker compose up -d

      - name: Wait for healthy services
        run: |
          for attempt in {1..30}; do
            api_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q api)")"
            web_status="$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q web)")"
            echo "Attempt ${attempt}: api=${api_status} web=${web_status}"
            if [ "${api_status}" = "healthy" ] && [ "${web_status}" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Verify Docker endpoints
        run: |
          node - <<'NODE'
          const checks = [
            ["API health", "http://127.0.0.1:4000/health"],
            ["API readiness", "http://127.0.0.1:4000/ready"],
            ["Web root", "http://127.0.0.1:5173/"]
          ];
          for (const [label, url] of checks) {
            const response = await fetch(url);
            console.log(`${label}: ${response.status}`);
            if (!response.ok) process.exit(1);
          }
          NODE

      - name: Verify browser-facing API URL
        run: |
          docker compose exec -T web node -e "process.exit(process.env.VITE_API_BASE_URL === 'http://localhost:4000' ? 0 : 1)"

      - name: Verify Docker services remain running
        run: |
          docker compose ps
          test "$(docker compose ps --status running -q | wc -l)" -eq 2

      - name: Docker logs
        if: failure()
        run: docker compose logs --no-color

      - name: Clean up Docker stack
        if: always()
        run: docker compose down -v --remove-orphans
