services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 4000
      ALLOW_LAN_ACCESS: "true"
      CORS_ORIGIN: http://localhost:5173
      STORAGE_ROOT: /app/data
      MIN_FREE_STORAGE_BYTES: 536870912
      MAX_MANAGED_STORAGE_BYTES: 0
      TEMP_FILE_MAX_AGE_MS: 86400000
      HOUSEKEEPING_INTERVAL_MS: 3600000
    volumes:
      - video_data:/app/data
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:4000
    ports:
      - "5173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:5173/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  video_data:
